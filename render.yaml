services:
  # BACKEND API - serwer Node.js z zwiększonym limitem pamięci
  - type: web
    name: longdrive-backend
    runtime: node
    buildCommand: cd server && npm install
    startCommand: node --max-old-space-size=512 server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512"

  # FRONTEND - aplikacja React SPA
  - type: web
    name: longdrive-frontend
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://longdrive-backend.onrender.com/api
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
