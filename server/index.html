<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>LongDrive - System zarządzania flotą</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #0f172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #f1f5f9;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .message {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 1rem;
            padding: 2rem;
            margin: 2rem 0;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 1rem;
            color: #cbd5e1;
        }

        .button {
            display: inline-block;
            background: linear-gradient(135deg, #6366f1, #22d3ee);
            color: white;
            text-decoration: none;
            padding: 0.75rem 1.5rem;
            border-radius: 0.5rem;
            font-weight: 600;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px -5px rgba(99, 102, 241, 0.4);
        }

        .status {
            font-size: 0.875rem;
            color: #64748b;
            margin-top: 2rem;
        }

        .status .dot {
            display: inline-block;
            width: 8px;
            height: 8px;
            background-color: #22c55e;
            border-radius: 50%;
            margin-right: 6px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        @media (max-width: 640px) {
            h1 { font-size: 1.75rem; }
            .message { padding: 1.5rem; }
            p { font-size: 1rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🚛</div>
        <h1>LongDrive</h1>
        <div class="message">
            <p>✨ System zarządzania flotą pojazdów ✨</p>
            <p>Aplikacja jest aktualnie uruchamiana przez serwer.</p>
            <p>Za chwilę zostaniesz przekierowany do interfejsu głównego.</p>
            <a href="/login" class="button">Przejdź do logowania →</a>
        </div>
        <div class="status">
            <span class="dot"></span>
            Status: Serwer działa poprawnie
        </div>
    </div>

    <!-- Automatyczne przekierowanie do /login po 2 sekundach -->
    <script>
        setTimeout(function() {
            window.location.href = '/login';
        }, 2000);
    </script>
</body>
</html>
